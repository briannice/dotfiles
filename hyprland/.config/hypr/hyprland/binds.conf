# ---------------------------------
# Programs
# ---------------------------------

bind = SUPER, space, exec, $menu
bind = SUPER, return, exec, $terminal
bind = SUPER, X, killactive,


bind = SUPER, f, exec, $fileManager
bind = SUPER, c, exec, $code
bind = SUPER, b, exec, $browser

bind = SUPER SHIFT, p, exec, $colorPicker
bind = SUPER SHIFT, V, exec, cliphist list | wofi --dmenu --pre-display-cmd "echo '%s' | cut -f 2" | cliphist decode | wl-copy

# ---------------------------------
# General
# ---------------------------------

bind = SUPER, l, exec, hyprlock

# ---------------------------------
# Windows
# ---------------------------------

bind = SUPER, left, movefocus, l
bind = SUPER, right, movefocus, r
bind = SUPER, up, movefocus, u
bind = SUPER, down, movefocus, d

bind = SUPER CTRL, left, movewindow, l
bind = SUPER CTRL, right, movewindow, r
bind = SUPER CTRL, up, movewindow, u
bind = SUPER CTRL, down, movewindow, d

# ---------------------------------
# Workspaces
# ---------------------------------

bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7

bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7

bind = SUPER SHIFT, right, workspace, +1
bind = SUPER SHIFT, left, workspace, -1

bindd = SUPER, TAB, Next workspace, workspace, e+1
bindd = SUPER SHIFT, TAB, Previous workspace, workspace, e-1

# ---------------------------------
# Mousepad
# ---------------------------------

gesture = 3, horizontal, workspace

# ---------------------------------
# Brightness and nightlamp
# ---------------------------------

binde = , XF86MonBrightnessDown, exec, hyprctl hyprsunset gamma -10
binde = , XF86MonBrightnessUp, exec, hyprctl hyprsunset gamma +10

binde = SHIFT, XF86MonBrightnessDown, exec, hyprctl hyprsunset temperature -500
binde = SHIFT, XF86MonBrightnessUp, exec, hyprctl hyprsunset temperature +500

# ---------------------------------
# Audio
# ---------------------------------

binde = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
binde = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
binde = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle


bind = SUPER, o, exec, hyprcook-notify 